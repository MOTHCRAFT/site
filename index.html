<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; 
            transition: transform 0.6s cubic-bezier(0.1, 0.4, 0.2, 1);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        #portalWrapper {
            position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0);
            width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98);
            border: 1px solid rgba(200, 180, 140, 0.2); z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 40px;
            transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(200, 180, 140, 0.1); color: rgba(200, 180, 140, 0.5); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>

    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
        let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, isTransitioning = false;

        const lampPos = { x: 0.77, y: 0.24 };
        const plantPos = { x: 0.32, y: 0.38 };

        window.addEventListener('mousemove', (e) => {
            if (isTransitioning) return;
            mouse.x = e.x; mouse.y = e.y;
            moveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-moveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Moth(true)]; 
            for (let i = 0; i < 15; i++) bugs.push(new Moth(false, 'moth'));
            for (let i = 0; i < 20; i++) bugs.push(new Moth(false, 'gnat'));
            
            stalks = [];
            const pX = window.innerWidth * plantPos.x;
            const pY = window.innerHeight * 0.82;
            for (let i = 0; i < 14; i++) {
                stalks.push(new Stalk(pX - 120 + (Math.random() * 240), pY + (Math.random() * 40)));
            }
        }

        class Stalk {
            constructor(x, y) {
                this.relX = x; this.y = y;
                this.h = 280 + Math.random() * 150; // Capped height
                this.segments = 5;
                this.off = Math.random() * 1000;
                this.curPush = 0;
            }
            draw() {
                let ax = this.relX - moveX;
                let tP = 0;
                if (mouse.x) {
                    let dx = mouse.x - ax, d = Math.hypot(dx, mouse.y - (this.y - this.h/2));
                    if (d < 220) tP = (dx > 0 ? -110 : 110) * (1 - d/220);
                }
                this.curPush += (tP - this.curPush) * 0.04;

                // OBS BLENDING TRICK: Dark/Transparent at bottom
                let grad = ctx.createLinearGradient(0, this.y, 0, this.y - this.h);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(0.2, 'rgba(210, 180, 140, 0.3)'); // Fading in
                grad.addColorStop(1, 'rgba(210, 180, 140, 0.7)'); // Full tan at top
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 3;
                
                // Draw Segmented Stalk
                let px = ax, py = this.y;
                for (let i = 1; i <= this.segments; i++) {
                    let t = i / this.segments;
                    const wind = Math.sin(Date.now() * 0.0008 + this.off + i) * (5 * t);
                    let targetX = ax + (Math.pow(t, 1.5) * this.curPush) + wind;
                    let targetY = this.y - (this.h * t);
                    
                    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                    
                    // Add Nodes (Segments)
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(targetX, targetY, 2, 0, Math.PI*2); ctx.fill();
                    
                    px = targetX; py = targetY;
                }

                // Feathered Head
                ctx.fillStyle = 'rgba(210, 180, 140, 0.4)';
                ctx.beginPath(); ctx.ellipse(px, py, 6, 22, Math.atan2(py - this.y, px - ax) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Moth {
            constructor(isKey, type = 'moth') {
                this.isKey = isKey; this.type = type;
                this.x = window.innerWidth * lampPos.x; this.y = window.innerHeight * lampPos.y;
                this.vx = 0; this.vy = 0; this.bloat = 0; this.state = 'active'; this.patience = 100;
                this.size = isKey ? 5 : (type === 'gnat' ? 0.8 : 2);
            }
            update() {
                const lx = (window.innerWidth * lampPos.x) - moveX, ly = window.innerHeight * lampPos.y;
                const px = (window.innerWidth * plantPos.x) - moveX, py = window.innerHeight * plantPos.y;

                if (this.state === 'bloating') {
                    this.x += (mouse.x - this.x) * 0.2; this.y += (mouse.y - this.y) * 0.2;
                    this.bloat += 0.35; if (this.bloat > 45) { portal.classList.add('active'); this.state = 'hidden'; isTransitioning = true; }
                    return;
                }
                if (this.state === 'hidden') return;

                let tX = lx, tY = ly;
                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isKey) {
                        if (d < 320) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.2); }
                        else { this.patience -= 0.3; if (this.patience <= 0) { this.x = lx; this.y = ly; this.patience = 100; } }
                    } else { tX = lx + (Math.random()-0.5)*120; tY = ly + (Math.random()-0.5)*120; }
                }

                let accel = this.isKey ? 0.0004 : (this.type === 'gnat' ? 0.008 : 0.001);
                this.vx += (tX - this.x) * accel + (Math.random()-0.5) * 0.4;
                this.vy += (tY - this.y) * accel + (Math.random()-0.5) * 0.4;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.95; this.vy *= 0.95;

                if (this.isKey && Math.hypot(this.x - px, this.y - py) < 60 && this.patience > 80) this.state = 'bloating';
            }
            draw() {
                if (this.state === 'hidden') return;
                ctx.save(); ctx.translate(this.x, this.y);
                let flap = Math.sin(Date.now() * 0.04) * (this.isKey ? 12 : 5);
                ctx.fillStyle = this.isKey ? `rgba(255,255,255,${this.patience/100})` : 'rgba(255, 255, 200, 0.15)';
                ctx.beginPath(); ctx.ellipse(0, 0, 1.5+this.bloat/12, 3+this.bloat/10, 0, 0, Math.PI*2); ctx.fill();
                if (this.type !== 'gnat') {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8-this.bloat/4, -3+flap); ctx.lineTo(-3,-7); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8+this.bloat/4, -3+flap); ctx.lineTo(3,-7); ctx.fill();
                }
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            stalks.forEach(s => s.draw());
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        setup(); animate();
    </script>
</body>
</html>
