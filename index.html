<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; z-index: 15; }

        #portalWrapper {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98);
            border: 1px solid rgba(0, 255, 65, 0.2); z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 40px;
            transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,65,0.1); color: rgba(0,255,65,0.5); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false">
        <input type="password" class="field">
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
        const img = new Image(); img.src = 'bg.jpg';
        
        let bugs = [], stalks = [], mouse = { x: null, y: null }, transitioning = false, imgData = {};

        window.addEventListener('mousemove', (e) => { if (!transitioning) { mouse.x = e.x; mouse.y = e.y; } });
        window.addEventListener('resize', setup);

        function getImgCoords() {
            const screenRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let drawW, drawH, offX, offY;

            if (screenRatio > imgRatio) {
                drawW = canvas.width; drawH = canvas.width / imgRatio;
                offX = 0; offY = (canvas.height - drawH) / 2;
            } else {
                drawH = canvas.height; drawW = canvas.height * imgRatio;
                offY = 0; offX = (canvas.width - drawW) / 2;
            }
            // Dynamic Panning within the Canvas
            let panX = mouse.x ? (mouse.x / canvas.width - 0.5) * -60 : 0;
            return { w: drawW, h: drawH, x: offX + panX, y: offY };
        }

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (!img.complete) return;
            imgData = getImgCoords();
            
            // Anchor Points mapped to image percentages
            const getPos = (px, py) => ({ x: imgData.x + (imgData.w * px), y: imgData.y + (imgData.h * py) });
            
            bugs = [new Moth(true, getPos)]; 
            for (let i = 0; i < 20; i++) bugs.push(new Moth(false, getPos, Math.random() > 0.3 ? 'gnat' : 'moth'));
            
            stalks = [];
            const p = getPos(0.32, 0.60); // Plant Root Base
            for (let i = 0; i < 15; i++) {
                stalks.push(new Stalk(p.x - 100 + (Math.random() * 200), p.y + (Math.random()*20)));
            }
        }

        class Stalk {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.h = 300 + Math.random() * 250;
                this.off = Math.random() * 1000;
                this.curPush = 0;
                this.leafSide = Math.random() > 0.5 ? 1 : -1;
            }
            draw() {
                let ax = this.x + (imgData.x - (imgData.x - (mouse.x ? (mouse.x / canvas.width - 0.5) * -60 : 0))); // PAN LOCK
                let tP = 0;
                if (mouse.x) {
                    let dx = mouse.x - this.x, d = Math.hypot(dx, mouse.y - (this.y - this.h/2));
                    if (d < 200) tP = (dx > 0 ? -90 : 90) * (1 - d/200);
                }
                this.curPush += (tP - this.curPush) * 0.04;
                const wind = Math.sin(Date.now() * 0.0007 + this.off) * 10;

                ctx.strokeStyle = 'rgba(15, 22, 10, 0.98)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                let cpX = this.x + this.curPush * 0.5, cpY = this.y - this.h/2, endX = this.x + this.curPush + wind, endY = this.y - this.h;
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.stroke();

                // Leaf & Tip
                ctx.beginPath();
                let lx = this.x + (endX - this.x) * 0.6, ly = this.y - this.h * 0.6;
                ctx.moveTo(lx, ly);
                ctx.quadraticCurveTo(lx + (this.leafSide * 40), ly - 10, lx + (this.leafSide * 20), ly + 40);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(30, 35, 20, 0.5)';
                ctx.beginPath(); ctx.ellipse(endX, endY, 5, 20, Math.atan2(endY - this.y, endX - this.x) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Moth {
            constructor(isKey, getPos, type = 'moth') {
                this.isKey = isKey; this.getPos = getPos; this.type = type;
                const p = getPos(0.77, 0.24); this.x = p.x; this.y = p.y;
                this.vx = 0; this.vy = 0; this.bloat = 0; this.state = 'active'; this.patience = 100;
            }
            update() {
                imgData = getImgCoords();
                const lp = this.getPos(0.77, 0.24), pp = this.getPos(0.32, 0.38);
                if (this.state === 'bloating') {
                    this.x += (mouse.x - this.x) * 0.2; this.y += (mouse.y - this.y) * 0.2;
                    this.bloat += 0.4; if (this.bloat > 50) { portal.classList.add('active'); this.state = 'hidden'; transitioning = true; }
                    return;
                }
                let tX = lp.x, tY = lp.y;
                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isKey) {
                        if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.3); }
                        else { this.patience -= 0.5; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                    } else { tX = lp.x + (Math.random()-0.5)*100; tY = lp.y + (Math.random()-0.5)*100; }
                }
                this.vx += (tX - this.x) * (this.isKey ? 0.001 : 0.01) + (Math.random()-0.5)*2;
                this.vy += (tY - this.y) * (this.isKey ? 0.001 : 0.01) + (Math.random()-0.5)*2;
                this.x += this.vx; this.y += this.vy; this.vx *= 0.92; this.vy *= 0.92;
                if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 50 && this.patience > 80) this.state = 'bloating';
            }
            draw() {
                if (this.state === 'hidden') return;
                ctx.save(); ctx.translate(this.x, this.y);
                let flap = Math.sin(Date.now() * 0.07) * (this.isKey ? 12 : 5);
                ctx.fillStyle = this.isKey ? `rgba(255,255,255,${this.patience/100})` : 'rgba(200,190,160,0.2)';
                ctx.beginPath(); ctx.ellipse(0, 0, 2+this.bloat/10, 4+this.bloat/10, 0, 0, Math.PI*2); ctx.fill();
                if (this.type !== 'gnat') {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10-this.bloat/3, -5+flap); ctx.lineTo(-5,-10); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10+this.bloat/3, -5+flap); ctx.lineTo(5,-10); ctx.fill();
                }
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete) {
                imgData = getImgCoords();
                ctx.drawImage(img, imgData.x, imgData.y, imgData.w, imgData.h);
                // Dark Overlay
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            }
            stalks.forEach(s => s.draw());
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        img.onload = setup;
        animate();
    </script>
</body>
</html>
