<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; transition: transform 0.5s ease-out; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.96) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 11; }
        #loginPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; padding: 40px; background: rgba(0,0,0,0.95); border: 1px solid #00ff41; color: #fff; font-family: monospace; z-index: 100; display: none; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="loginPanel">
        <h2 style="color: #00ff41; letter-spacing: 5px; margin-bottom: 20px;">MOTHLABS</h2>
        <p style="font-size: 10px; color: #888;">IDENTITY CONFIRMED</p>
        <input type="password" placeholder="COMMUNION ACCESS" style="background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 80%; outline: none; margin-top: 10px;">
    </div>

    <script>
        const bg = document.getElementById('bg');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loginPanel = document.getElementById('loginPanel');
        
        let bugs = [];
        let stalks = [];
        const mouse = { x: null, y: null };
        let portalProgress = 0;

        const lampX = () => window.innerWidth * 0.77;
        const lampY = () => window.innerHeight * 0.24;
        const plantX = () => window.innerWidth * 0.32;
        const plantY = () => window.innerHeight * 0.60;

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x; mouse.y = e.y;
            const moveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-moveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Bug(true)]; 
            for (let i = 0; i < 22; i++) bugs.push(new Bug(false));
            
            const offsets = [-90, -60, -35, -10, 10, 30, 55, 80, 105, 130, 160, 190];
            stalks = offsets.map((off, i) => ({
                x: plantX() + off,
                baseY: window.innerHeight * 0.95, // Rooted deeper
                h: 500 + (i % 4 * 60), // Towering height
                w: 3 + (i % 2 * 2),
                lean: (i % 2 === 0 ? -0.15 : 0.15),
                seed: i * 700
            }));
        }

        class Bug {
            constructor(isBig) {
                this.isBig = isBig;
                this.x = lampX(); this.y = lampY();
                this.size = isBig ? 5 : 1.2;
                this.vx = (Math.random()-0.5) * 4; this.vy = (Math.random()-0.5) * 4;
                this.patience = 100;
                this.returning = false;
            }
            update() {
                let lx = lampX(), ly = lampY();
                let px = plantX(), py = plantY();
                let targetX = lx, targetY = ly;

                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isBig) {
                        if (d < 350 && !this.returning) {
                            targetX = mouse.x; targetY = mouse.y;
                            if (d > 140) this.patience -= 0.15;
                            else this.patience = Math.min(100, this.patience + 0.4);
                        } else { this.patience -= 0.8; }
                        if (this.patience <= 0) this.returning = true;
                        if (this.returning && Math.hypot(this.x - lx, this.y - ly) < 30) this.returning = false;
                    } else {
                        // Small bugs stay tight to the light
                        targetX = lx + (Math.random()-0.5)*40;
                        targetY = ly + (Math.random()-0.5)*40;
                    }
                }

                this.vx += (targetX - this.x) * (this.isBig ? 0.0012 : 0.008) + (Math.random()-0.5) * 1.8;
                this.vy += (targetY - this.y) * (this.isBig ? 0.0012 : 0.008) + (Math.random()-0.5) * 1.8;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.90; this.vy *= 0.92;

                if (this.isBig && Math.hypot(this.x - px, this.y - py) < 90) {
                    portalProgress++;
                    if (portalProgress > 100) loginPanel.style.display = 'block';
                } else if (this.isBig) { portalProgress = 0; }
            }
            draw() {
                ctx.fillStyle = this.isBig ? `rgba(255,255,255,${Math.max(0.1, this.patience/100)})` : 'rgba(255,255,150,0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawVeil() {
            stalks.forEach(s => {
                let leanX = s.lean;
                if (mouse.x) {
                    let d = Math.abs(mouse.x - s.x);
                    if (d < 180) leanX += (mouse.x - s.x) * 0.004;
                }

                const time = Date.now() * 0.001;
                const wind = Math.sin(time + s.seed) * 12;
                const startX = s.x;
                const startY = s.baseY;
                const endX = s.x + (leanX * 150) + wind;
                const endY = s.baseY - s.h;

                ctx.strokeStyle = 'rgba(210, 180, 140, 0.7)'; // Tan for debug
                ctx.lineWidth = s.w;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(startX + (leanX * 60), startY - s.h/2, endX, endY);
                ctx.stroke();

                ctx.fillStyle = 'rgba(210, 180, 140, 0.5)';
                ctx.beginPath();
                ctx.ellipse(endX, endY, s.w * 2.5, 25, Math.atan2(endY - startY, endX - startX) + Math.PI/2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawVeil();
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup(); animate();
    </script>
</body>
</html>
