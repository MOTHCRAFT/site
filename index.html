<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        
        /* Layer 1: Deep Space Swirl */
        .space {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 70%);
            z-index: 1;
        }

        /* Layer 2: The Street Light */
        .light-container {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center;
        }
        
        .lamp-post {
            width: 4px; height: 300px; background: #222; margin: 0 auto; position: relative;
        }
        
        .lamp-head {
            width: 40px; height: 20px; background: #333; border-radius: 50% 50% 0 0; position: absolute; top: -15px; left: -18px;
        }

        /* The Glow */
        .glow {
            position: absolute; top: -60px; left: -100px; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,150,0.2) 0%, rgba(255,255,150,0) 70%);
            border-radius: 50%;
            filter: blur(20px);
            animation: flicker 4s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .title {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 5px; text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="space"></div>
    
    <div class="light-container">
        <div class="glow"></div>
        <div class="lamp-post">
            <div class="lamp-head"></div>
        </div>
        <div class="title">MOTHLABS</div>
    </div>
</body>
</html>
