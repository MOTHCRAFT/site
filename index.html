<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; transition: opacity 2s ease-in-out; }
        .sanctuary-bg { position: fixed; top: 0; left: -10%; width: 120%; height: 100%; background: url('bg.jpg') no-repeat center center; background-size: cover; z-index: 1; transition: transform 0.8s cubic-bezier(0.1, 0.4, 0.2, 1); }
        .frosted-filter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%); opacity: 0.6; mix-blend-mode: overlay; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }
        #portalWrapper { position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0); width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98); border: 1px solid rgba(200, 180, 140, 0.1); z-index: 100; opacity: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); border-radius: 40px; transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1); overflow: hidden; }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(200, 180, 140, 0.05); color: rgba(200, 180, 140, 0.4); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="loadingScreen"></div>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <div class="frosted-filter"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const img = new Image(); img.src = 'bg.jpg';
        img.onload = function() {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').remove(), 2000);

            const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
            let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, transitioning = false;

            const LAMP_IMG_X = 0.745, LAMP_IMG_Y = 0.21, PLANT_IMG_X = 0.32, PLANT_IMG_Y = 0.73;

            window.addEventListener('mousemove', (e) => {
                if (transitioning) return;
                mouse.x = e.x; mouse.y = e.y;
                moveX = (e.clientX / window.innerWidth - 0.5) * 45;
                bg.style.transform = `translateX(${-moveX}px)`;
            });

            function getScreenCoords(imgX_pct, imgY_pct) {
                const vW = window.innerWidth, vH = window.innerHeight, bgW = vW * 1.2;
                return { x: (vW/2)-(moveX)+(bgW*(imgX_pct-0.5)), y: vH*imgY_pct };
            }

            class Reed {
                constructor() {
                    const spread = (Math.random() - 0.5) * 0.48;
                    this.relX = PLANT_IMG_X + spread; this.relY = PLANT_IMG_Y + (Math.random() * 0.08);
                    this.hMult = 0.30 + (Math.random() * 0.25); this.off = Math.random() * 1000;
                    this.curPush = 0; this.segments = 3; this.baseLean = (Math.random() - 0.5) * 0.4;
                    this.w = 1.2 + (Math.random() * 2);
                    const distFromLight = Math.abs(this.relX - LAMP_IMG_X);
                    this.lightIntensity = Math.max(0.05, 1 - (distFromLight * 1.7));
                    this.leaves = Array.from({length: Math.floor(Math.random() * 3)}, () => ({
                        yPos: 0.3 + (Math.random() * 0.3), side: Math.random() > 0.5 ? 1 : -1, droop: 30 + Math.random() * 40, len: 25 + Math.random() * 30
                    }));
                }
                draw() {
                    const pos = getScreenCoords(this.relX, this.relY), h = window.innerHeight * this.hMult;
                    let tP = 0;
                    if (mouse.x) {
                        let dx = mouse.x - pos.x, d = Math.hypot(dx, mouse.y - (pos.y - h/2));
                        if (d < 180) tP = (dx > 0 ? -110 : 110) * (1 - d/180);
                    }
                    this.curPush += (tP - this.curPush) * 0.04;
                    let grad = ctx.createLinearGradient(0, pos.y, 0, pos.y - h);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(0.2, `rgba(12, 18, 10, ${this.lightIntensity * 0.95})`);
                    grad.addColorStop(1, `rgba(180, 160, 120, ${this.lightIntensity * 0.5})`);
                    ctx.strokeStyle = grad; ctx.lineWidth = this.w;
                    let px = pos.x, py = pos.y;
                    for (let j = 1; j <= this.segments; j++) {
                        let t = j / this.segments;
                        let wind = Math.sin(Date.now() * 0.0005 + this.off + j) * (12 * t);
                        let targetX = pos.x + (Math.pow(t, 1.4) * (this.curPush + (this.baseLean * 80))) + wind;
                        let targetY = pos.y - (h * t);
                        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                        if (j === 2) {
                            this.leaves.forEach(leaf => {
                                if (Math.abs(leaf.yPos - t) < 0.2) {
                                    ctx.save(); ctx.translate(targetX, targetY);
                                    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(leaf.side * leaf.len, -5, leaf.side * (leaf.len*0.8), leaf.droop);
                                    ctx.strokeStyle = `rgba(12, 18, 10, ${this.lightIntensity})`; ctx.lineWidth = this.w * 0.6; ctx.stroke();
                                    ctx.restore();
                                }
                            });
                        }
                        px = targetX; py = targetY;
                    }
                    ctx.fillStyle = `rgba(120, 110, 90, ${this.lightIntensity * 0.3})`;
                    ctx.beginPath(); ctx.ellipse(px, py, this.w * 1.2, 16, Math.atan2(py - pos.y, px - pos.x) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
                }
            }

            class Critter {
                constructor(isKey, type = 'moth') {
                    this.isKey = isKey; this.type = type;
                    const p = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                    this.x = p.x; this.y = p.y;
                    this.vx = 0; this.vy = 0;
                    this.bloat = 0; this.state = 'active'; this.patience = 100;
                    this.off = Math.random() * 1000;
                    
                    if (isKey) {
                        this.size = 3.5; this.hue = '255, 255, 240'; this.speedLimit = 0.96;
                    } else if (type === 'gnat') {
                        this.size = 0.4; this.hue = '255, 220, 120'; this.speedLimit = 0.92;
                    } else if (type === 'crane') {
                        this.size = 0.8; this.hue = '160, 160, 150'; this.speedLimit = 0.98;
                    } else {
                        this.size = 1.4; this.hue = '140, 130, 110'; this.speedLimit = 0.96;
                    }
                }
                update() {
                    const lp = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y), pp = getScreenCoords(PLANT_IMG_X, 0.40);
                    if (this.state === 'bloating') {
                        this.x += (mouse.x - this.x) * 0.15; this.y += (mouse.y - this.y) * 0.15;
                        this.bloat += 0.2; if (this.bloat > 40) { portal.classList.add('active'); this.state = 'hidden'; transitioning = true; }
                        return;
                    }
                    if (this.state === 'hidden') return;
                    let tX = lp.x, tY = lp.y;
                    if (mouse.x) {
                        let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                        if (this.isKey) {
                            if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.1); }
                            else { this.patience -= 0.2; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                        } else if (this.type !== 'gnat' && d < 70) { tX = mouse.x; tY = mouse.y; }
                    }
                    let accel = this.isKey ? 0.0002 : (this.type === 'gnat' ? 0.008 : 0.0005);
                    this.vx += (tX - this.x) * accel + (Math.random()-0.5) * (this.type === 'gnat' ? 0.8 : 0.2);
                    this.vy += (tY - this.y) * accel + (Math.random()-0.5) * (this.type === 'gnat' ? 0.8 : 0.2);
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= this.speedLimit; this.vy *= this.speedLimit;
                    if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 60 && this.patience > 80) this.state = 'bloating';
                }
                draw() {
                    if (this.state === 'hidden') return;
                    ctx.save(); ctx.translate(this.x, this.y);
                    let time = Date.now() * 0.002;
                    let shimmer = Math.sin(Date.now() * 0.01 + this.off) * 0.3 + 0.5;
                    ctx.shadowBlur = this.isKey ? 10 : 3; ctx.shadowColor = `rgba(${this.hue}, 0.3)`;
                    ctx.fillStyle = `rgba(${this.hue}, ${this.isKey ? this.patience/100 : 0.25})`;
                    
                    if (this.type === 'crane') {
                        ctx.rotate(Math.PI/4 + Math.sin(time)*0.2);
                        ctx.fillRect(-0.5, -2, 1, 4); // Shortened body
                        ctx.globalAlpha = shimmer * 0.2;
                        ctx.beginPath(); ctx.ellipse(-2, 0, 2, 0.5, 0, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(2, 0, 2, 0.5, 0, 0, Math.PI*2); ctx.fill();
                    } else {
                        // Tapered body for moths
                        ctx.beginPath(); 
                        ctx.moveTo(0, -this.size); 
                        ctx.quadraticCurveTo(this.size, 0, 0, this.size); 
                        ctx.quadraticCurveTo(-this.size, 0, 0, -this.size); 
                        ctx.fill();
                        if (this.type !== 'gnat') {
                            ctx.globalAlpha = shimmer * 0.15;
                            let flap = Math.sin(Date.now() * 0.04) * 6;
                            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-6, -1+flap); ctx.lineTo(-2,-4); ctx.fill();
                            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(6, -1+flap); ctx.lineTo(2,-4); ctx.fill();
                        }
                    }
                    ctx.restore();
                }
            }

            function setup() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                bugs = [new Critter(true)];
                for (let i = 0; i < 7; i++) bugs.push(new Critter(false, 'moth'));
                for (let i = 0; i < 7; i++) bugs.push(new Critter(false, 'crane'));
                for (let i = 0; i < 15; i++) bugs.push(new Critter(false, 'gnat'));
                stalks = Array.from({length: 35}, () => new Reed());
            }

            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stalks.forEach(s => s.draw());
                bugs.forEach(b => { b.update(); b.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', setup); setup(); animate();
        };
    </script>
</body>
</html>
