<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; transition: opacity 2.5s ease-in-out; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; transition: transform 0.8s ease-out; 
        }
        .frosted-filter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%); opacity: 0.5; mix-blend-mode: overlay; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        /* Muted Wordless Login */
        #portalWrapper {
            position: fixed; top: 50%; left: 32%; transform: translate(-50%, -50%);
            width: 320px; z-index: 100; opacity: 0; display: flex; flex-direction: column; 
            align-items: center; pointer-events: none; transition: opacity 2s ease-in;
        }
        #portalWrapper.active { opacity: 1; pointer-events: auto; }
        .field { background: rgba(0,0,0,0.6); border: 1px solid rgba(200, 180, 140, 0.05); color: rgba(200, 180, 140, 0.3); padding: 22px; width: 80%; border-radius: 25px; outline: none; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>
    <div id="loadingScreen"></div>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <div class="frosted-filter"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const img = new Image(); img.src = 'bg.jpg';
        img.onload = function() {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').remove(), 2500);

            const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
            let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, transitioning = false;

            const LAMP_IMG_X = 0.745, LAMP_IMG_Y = 0.22, PLANT_IMG_X = 0.32, PLANT_IMG_Y = 0.73;

            window.addEventListener('mousemove', (e) => {
                if (transitioning) return;
                mouse.x = e.x; mouse.y = e.y;
                moveX = (e.clientX / window.innerWidth - 0.5) * 45;
                bg.style.transform = `translateX(${-moveX}px)`;
            });

            function getScreenCoords(imgX_pct, imgY_pct) {
                const vW = window.innerWidth, vH = window.innerHeight, bgW = vW * 1.2;
                return { x: (vW/2)-(moveX)+(bgW*(imgX_pct-0.5)), y: vH*imgY_pct };
            }

            class Stalk {
                constructor() {
                    const spread = (Math.random() - 0.5) * 0.45;
                    this.relX = PLANT_IMG_X + spread; 
                    this.relY = PLANT_IMG_Y + (Math.random() * 0.08);
                    this.type = Math.random() > 0.7 ? 'tall' : 'reed';
                    this.hMult = this.type === 'tall' ? 0.45 + Math.random()*0.2 : 0.28 + Math.random()*0.2;
                    this.off = Math.random() * 1000;
                    this.curPush = 0;
                    this.w = this.type === 'tall' ? 1.5 : 2.5 + Math.random()*2;
                    this.light = Math.max(0.05, 1 - (Math.abs(this.relX - LAMP_IMG_X) * 1.7));
                    this.leafSide = Math.random() > 0.5 ? 1 : -1;
                }
                draw() {
                    const pos = getScreenCoords(this.relX, this.relY), h = window.innerHeight * this.hMult;
                    let tP = 0;
                    if (mouse.x) {
                        let dx = mouse.x - pos.x, d = Math.hypot(dx, mouse.y - (pos.y - h/2));
                        if (d < 180) tP = (mouse.x - pos.x > 0 ? -110 : 110) * (1 - d/180);
                    }
                    this.curPush += (tP - this.curPush) * 0.04;

                    let grad = ctx.createLinearGradient(0, pos.y, 0, pos.y - h);
                    grad.addColorStop(0, 'rgba(0,0,0,0)'); // Fade into floor
                    grad.addColorStop(0.2, `rgba(10, 15, 8, ${this.light * 0.95})`);
                    grad.addColorStop(1, `rgba(160, 145, 100, ${this.light * 0.6})`); // Amber catch
                    
                    ctx.strokeStyle = grad; ctx.lineWidth = this.w;
                    let px = pos.x, py = pos.y;
                    let segments = this.type === 'tall' ? 2 : 3;

                    for (let j = 1; j <= segments; j++) {
                        let t = j / segments;
                        let wind = Math.sin(Date.now() * 0.0005 + this.off + j) * (10 * t);
                        let targetX = pos.x + (Math.pow(t, 1.4) * (this.curPush + wind));
                        let targetY = pos.y - (h * t);
                        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                        
                        if (this.type === 'reed' && j === 2) {
                            ctx.save(); ctx.translate(targetX, targetY);
                            ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(this.leafSide * 30, -5, this.leafSide * 20, 60);
                            ctx.strokeStyle = `rgba(10, 15, 8, ${this.light})`; ctx.lineWidth = 1.2; ctx.stroke();
                            ctx.restore();
                        }
                        px = targetX; py = targetY;
                    }
                    if (this.type === 'reed') {
                        ctx.fillStyle = `rgba(120, 110, 90, ${this.light * 0.3})`;
                        ctx.beginPath(); ctx.ellipse(px, py, this.w * 1.5, 18, Math.atan2(py - pos.y, px - pos.x) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
                    }
                }
            }

            class Bug {
                constructor(isKey, type = 'moth') {
                    this.isKey = isKey; this.type = type;
                    const p = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                    this.x = p.x; this.y = p.y;
                    this.vx = 0; this.vy = 0;
                    this.bloat = 0; this.state = 'active'; this.patience = 100;
                    this.off = Math.random() * 1000; this.dir = 1; this.walk = 0;
                }
                update() {
                    const lp = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y), pp = getScreenCoords(PLANT_IMG_X, 0.40);
                    if (this.state === 'grazing') {
                        this.walk += 0.04; this.x += Math.sin(this.walk)*0.4; this.y += Math.cos(this.walk)*0.1;
                        if (this.walk > 10) portal.classList.add('active');
                        return;
                    }
                    if (this.state === 'hidden') return;
                    let tX = lp.x, tY = lp.y;
                    if (mouse.x) {
                        let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                        if (this.isKey) {
                            if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.1); }
                            else { this.patience -= 0.25; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                        } else if (this.type !== 'gnat' && d < 70) { tX = mouse.x; tY = mouse.y; }
                    }
                    let acc = this.isKey ? 0.0002 : (this.type === 'gnat' ? 0.007 : 0.0006);
                    this.vx += (tX - this.x) * acc + (Math.random()-0.5) * (this.type === 'gnat' ? 1.0 : 0.25);
                    this.vy += (tY - this.y) * acc + (Math.random()-0.5) * (this.type === 'gnat' ? 1.0 : 0.25);
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= 0.97; this.vy *= 0.97;
                    if (this.vx > 0.1) this.dir = 1; if (this.vx < -0.1) this.dir = -1;
                    if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 50 && this.patience > 80) this.state = 'grazing';
                }
                draw() {
                    if (this.state === 'hidden') return;
                    ctx.save(); ctx.translate(this.x, this.y);
                    let shimmer = Math.sin(Date.now()*0.01 + this.off)*0.2 + 0.4;
                    if (this.type === 'gnat') {
                        ctx.fillStyle = `rgba(255,200,100,0.2)`; ctx.beginPath(); ctx.arc(0,0,0.5,0,Math.PI*2); ctx.fill();
                    } else if (this.type === 'crane') {
                        ctx.scale(this.dir, 1);
                        ctx.fillStyle = `rgba(160,160,150,0.3)`; ctx.fillRect(-0.5, 0, 1, 5); // Hang down
                        ctx.globalAlpha = shimmer; ctx.beginPath(); ctx.ellipse(-2,-1,2,0.5,0,0,Math.PI*2); ctx.fill();
                    } else {
                        // Tapered "Seed" Body
                        ctx.fillStyle = this.isKey ? `rgba(255,255,240,${this.patience/100})` : 'rgba(150,130,100,0.2)';
                        ctx.beginPath(); ctx.moveTo(0,-2.5); ctx.quadraticCurveTo(1.5,0,0,2.5); ctx.quadraticCurveTo(-1.5,0,0,-2.5); ctx.fill();
                        ctx.globalAlpha = shimmer; let flap = Math.sin(Date.now()*0.04)*5;
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-6,-1+flap); ctx.lineTo(-2,-4); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(6,-1+flap); ctx.lineTo(2,-4); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function setup() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                bugs = [new Bug(true, 'key')];
                for(let i=0; i<6; i++) bugs.push(new Bug(false, 'moth'));
                for(let i=0; i<6; i++) bugs.push(new Bug(false, 'crane'));
                for(let i=0; i<25; i++) bugs.push(new Bug(false, 'gnat'));
                stalks = Array.from({length: 40}, () => new Stalk());
            }

            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stalks.forEach(s => s.draw());
                bugs.forEach(b => { b.update(); b.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', setup); setup(); animate();
        };
    </script>
</body>
</html>
