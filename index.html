<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; transition: opacity 2s ease-in-out; }
        
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; 
            transition: transform 0.8s cubic-bezier(0.1, 0.4, 0.2, 1);
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        /* wordless minimalist panels */
        #portalWrapper {
            position: fixed; top: 50%; left: 32%; transform: translate(-50%, -50%);
            width: 320px; z-index: 100; opacity: 0; display: flex; flex-direction: column; 
            align-items: center; pointer-events: none; transition: opacity 2s ease-in;
        }
        #portalWrapper.active { opacity: 1; pointer-events: auto; }
        .field { background: rgba(0,0,0,0.6); border: 1px solid rgba(200, 180, 140, 0.1); color: rgba(200, 180, 140, 0.4); padding: 22px; width: 80%; border-radius: 20px; outline: none; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>
    <div id="loadingScreen"></div>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const img = new Image(); img.src = 'bg.jpg';
        img.onload = function() {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').remove(), 2000);

            const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
            let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, isTransitioning = false;

            const LAMP_X = 0.745, LAMP_Y = 0.21, PLANT_X = 0.32, PLANT_Y = 0.73;

            window.addEventListener('mousemove', (e) => {
                if (isTransitioning) return;
                mouse.x = e.x; mouse.y = e.y;
                moveX = (e.clientX / window.innerWidth - 0.5) * 45;
                bg.style.transform = `translateX(${-moveX}px)`;
            });

            function getPos(imgX_pct, imgY_pct) {
                const bgW = window.innerWidth * 1.2;
                return { x: (window.innerWidth/2)-(moveX)+(bgW*(imgX_pct-0.5)), y: window.innerHeight*imgY_pct };
            }

            class Stalk {
                constructor(isChuck) {
                    this.isChuck = isChuck;
                    const spread = (Math.random() - 0.5);
                    this.relX = PLANT_X + (spread * spread * spread * 0.6); // Huddle logic
                    this.relY = PLANT_Y + (Math.random() * 0.05);
                    this.hMult = isChuck ? 0.2 + Math.random()*0.1 : 0.35 + Math.random()*0.2;
                    this.w = isChuck ? 6 + Math.random()*4 : 2 + Math.random()*2;
                    this.off = Math.random()*1000; this.curP = 0;
                    this.leafSide = Math.random() > 0.5 ? 1 : -1;
                }
                draw() {
                    const p = getPos(this.relX, this.relY), h = window.innerHeight * this.hMult;
                    let tP = 0;
                    if (mouse.x) {
                        let dx = mouse.x - p.x, d = Math.hypot(dx, mouse.y - (p.y - h/2));
                        if (d < 180) tP = (mouse.x - p.x > 0 ? -100 : 100) * (1 - d/180);
                    }
                    this.curP += (tP - this.curP) * 0.04;
                    
                    // OBS Blending Gradient
                    let grad = ctx.createLinearGradient(0, p.y, 0, p.y - h);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(0.3, 'rgba(210, 180, 140, 0.4)'); // TAN for debug
                    grad.addColorStop(1, 'rgba(210, 180, 140, 0.8)');

                    ctx.strokeStyle = grad; ctx.lineWidth = this.w;
                    let px = p.x, py = p.y;

                    if (this.isChuck) {
                        // Broad Foliage (Chucks)
                        const wind = Math.sin(Date.now() * 0.0004 + this.off) * 5;
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.ellipse(p.x + this.curP + wind, p.y - h/2, this.w*2, h/2, Math.sin(wind*0.1), 0, Math.PI*2);
                        ctx.fill();
                    } else {
                        // 3-Segment Reeds
                        for (let j = 1; j <= 3; j++) {
                            let t = j / 3;
                            let wind = Math.sin(Date.now() * 0.0006 + this.off + j) * (10 * t);
                            let targetX = p.x + (Math.pow(t, 1.3) * this.curP) + wind;
                            let targetY = p.y - (h * t);
                            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                            if (j === 2) { // Shuck/Leaf
                                ctx.save(); ctx.translate(targetX, targetY);
                                ctx.beginPath(); ctx.moveTo(0,0);
                                ctx.quadraticCurveTo(this.leafSide*40, -10, this.leafSide*30, 60);
                                ctx.stroke(); ctx.restore();
                            }
                            px = targetX; py = targetY;
                        }
                        // Feathered Head
                        ctx.fillStyle = 'rgba(210, 180, 140, 0.4)';
                        ctx.beginPath(); ctx.ellipse(px, py, 6, 22, Math.atan2(py-p.y, px-p.x)+Math.PI/2, 0, Math.PI*2); ctx.fill();
                    }
                }
            }

            class Bug {
                constructor(isKey, type) {
                    this.isKey = isKey; this.type = type;
                    const p = getPos(LAMP_X, LAMP_Y);
                    this.x = p.x; this.y = p.y;
                    this.vx = 0; this.vy = 0;
                    this.patience = 100; this.state = 'active'; this.off = Math.random()*1000;
                    this.dir = 1; this.walk = 0;
                }
                update() {
                    const lp = getPos(LAMP_X, LAMP_Y), pp = getPos(PLANT_X, 0.42);
                    if (this.state === 'grazing') {
                        this.walk += 0.04; // Slower grazing
                        this.x += Math.sin(this.walk)*0.4; this.y += Math.cos(this.walk)*0.1;
                        if (this.walk > 8) portal.classList.add('active');
                        return;
                    }
                    let tX = lp.x, tY = lp.y;
                    if (mouse.x) {
                        let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                        if (this.isKey) {
                            if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.1); }
                            else { this.patience -= 0.2; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                        } else if (this.type !== 'gnat' && d < 70) { tX = mouse.x; tY = mouse.y; }
                    }
                    let acc = this.isKey ? 0.0002 : (this.type === 'gnat' ? 0.008 : 0.0006);
                    this.vx += (tX - this.x) * acc + (Math.random()-0.5) * (this.type === 'gnat' ? 1.2 : 0.25);
                    this.vy += (tY - this.y) * acc + (Math.random()-0.5) * (this.type === 'gnat' ? 1.2 : 0.25);
                    this.x += this.vx; this.y += this.vy; this.vx *= 0.96; this.vy *= 0.96;
                    if (this.vx > 0.1) this.dir = 1; if (this.vx < -0.1) this.dir = -1;
                    
                    // Trigger grazing on trichomes
                    if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 50 && this.patience > 80) {
                        this.state = 'grazing';
                    }
                }
                draw() {
                    ctx.save(); ctx.translate(this.x, this.y);
                    let shimmer = Math.sin(Date.now()*0.01 + this.off)*0.2 + 0.4;
                    if (this.type === 'gnat') {
                        ctx.fillStyle = `rgba(255,200,100,0.2)`; ctx.beginPath(); ctx.arc(0,0,0.5,0,Math.PI*2); ctx.fill();
                    } else if (this.type === 'crane') {
                        ctx.scale(this.dir, 1);
                        ctx.fillStyle = `rgba(160,160,150,0.3)`; ctx.fillRect(-0.5, 0, 1, 5);
                        ctx.globalAlpha = shimmer; ctx.beginPath(); ctx.ellipse(-2,-1,2,0.5,0,0,Math.PI*2); ctx.fill();
                    } else {
                        ctx.fillStyle = this.isKey ? `rgba(255,255,240,${this.patience/100})` : 'rgba(150,130,100,0.2)';
                        ctx.beginPath(); ctx.ellipse(0,0,1.2,2.5,0,0,Math.PI*2); ctx.fill();
                        ctx.globalAlpha = shimmer; let flap = Math.sin(Date.now()*0.04)*5;
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-6,-1+flap); ctx.lineTo(-2,-4); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(6,-1+flap); ctx.lineTo(2,-4); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function setup() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                bugs = [new Bug(true, 'key')];
                for(let i=0; i<6; i++) bugs.push(new Bug(false, 'moth'));
                for(let i=0; i<6; i++) bugs.push(new Bug(false, 'crane'));
                for(let i=0; i<25; i++) bugs.push(new Bug(false, 'gnat'));
                stalks = [];
                for(let i=0; i<40; i++) stalks.push(new Stalk(Math.random()>0.8));
            }

            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stalks.forEach(s => s.draw());
                bugs.forEach(b => { b.update(); b.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', setup); setup(); animate();
        };
    </script>
</body>
</html>
