<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        .space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 70%); z-index: 1; }
        
        /* The Moths Layer */
        #mothCanvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        .light-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; }
        .lamp-post { width: 4px; height: 250px; background: #222; margin: 0 auto; position: relative; }
        .lamp-head { width: 40px; height: 20px; background: #333; border-radius: 50% 50% 0 0; position: absolute; top: -15px; left: -18px; }
        .glow { position: absolute; top: -60px; left: -100px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,150,0.2) 0%, rgba(255,255,150,0) 70%); border-radius: 50%; filter: blur(20px); animation: flicker 4s infinite alternate; }
        @keyframes flicker { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
        .title { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 8px; text-transform: uppercase; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="space"></div>
    <canvas id="mothCanvas"></canvas>
    
    <div class="light-container">
        <div class="glow" id="streetLight"></div>
        <div class="lamp-post"><div class="lamp-head"></div></div>
        <div class="title">MOTHLABS</div>
    </div>

    <script>
        const canvas = document.getElementById('mothCanvas');
        const ctx = canvas.getContext('2d');
        const light = document.getElementById('streetLight').getBoundingClientRect();
        let moths = [];
        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', setup);

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            moths = [];
            for (let i = 0; i < 30; i++) moths.push(new Moth());
        }

        class Moth {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = 0;
                this.speedY = 0;
            }
            update() {
                // Target: Mouse if nearby, otherwise the street light
                let targetX = mouse.x || (window.innerWidth / 2);
                let targetY = mouse.y || (window.innerHeight * 0.8);

                let dx = targetX - this.x;
                let dy = targetY - this.y;
                
                this.speedX += dx * 0.001 + (Math.random() - 0.5) * 0.5;
                this.speedY += dy * 0.001 + (Math.random() - 0.5) * 0.5;
                
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= 0.95; // Friction
                this.speedY *= 0.95;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            moths.forEach(moth => { moth.update(); moth.draw(); });
            requestAnimationFrame(animate);
        }

        setup();
        animate();
    </script>
</body>
</html>
