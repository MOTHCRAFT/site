<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; 
            transition: transform 0.6s cubic-bezier(0.1, 0.4, 0.2, 1);
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        #portalWrapper {
            position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0);
            width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98);
            border: 1px solid rgba(200, 180, 140, 0.2); z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 40px;
            transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(200, 180, 140, 0.1); color: rgba(200, 180, 140, 0.5); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>

    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
        let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, isTransitioning = false;

        // Anchor Constants (Percentages of the viewport)
        const lampPos = { x: 0.77, y: 0.24 };
        const plantPos = { x: 0.32, y: 0.38 };

        window.addEventListener('mousemove', (e) => {
            if (isTransitioning) return;
            mouse.x = e.x; mouse.y = e.y;
            moveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-moveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Moth(true)]; 
            for (let i = 0; i < 15; i++) bugs.push(new Moth(false, 'moth'));
            for (let i = 0; i < 20; i++) bugs.push(new Moth(false, 'gnat'));
            
            stalks = [];
            const plantX = window.innerWidth * plantPos.x;
            const plantY = window.innerHeight * 0.85;
            for (let i = 0; i < 18; i++) {
                stalks.push({
                    relX: plantX - 150 + (Math.random() * 300),
                    baseY: plantY + (Math.random() * 50),
                    h: 500 + Math.random() * 300,
                    w: 2 + Math.random() * 2,
                    off: Math.random() * 1000,
                    lSide: Math.random() > 0.5 ? 1 : -1,
                    curP: 0
                });
            }
        }

        class Moth {
            constructor(isKey, type = 'moth') {
                this.isKey = isKey; this.type = type;
                this.x = window.innerWidth * lampPos.x; 
                this.y = window.innerHeight * lampPos.y;
                this.vx = 0; this.vy = 0;
                this.patience = 100; this.state = 'active'; this.bloat = 0;
                this.size = isKey ? 4.5 : (type === 'gnat' ? 0.8 : 2);
            }
            update() {
                const lx = (window.innerWidth * lampPos.x) - moveX;
                const ly = window.innerHeight * lampPos.y;
                const px = (window.innerWidth * plantPos.x) - moveX;
                const py = window.innerHeight * plantPos.y;

                if (this.state === 'bloating') {
                    this.x += (mouse.x - this.x) * 0.15; this.y += (mouse.y - this.y) * 0.15;
                    this.bloat += 0.3; if (this.bloat > 40) { portal.classList.add('active'); this.state = 'hidden'; isTransitioning = true; }
                    return;
                }
                if (this.state === 'hidden') return;

                let tX = lx, tY = ly;
                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isKey) {
                        if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.2); }
                        else { this.patience -= 0.4; if (this.patience <= 0) { this.x = lx; this.y = ly; this.patience = 100; } }
                    } else { tX = lx + (Math.random()-0.5)*80; tY = ly + (Math.random()-0.5)*80; }
                }

                // DRIFT PHYSICS (Lower accel, more friction)
                let accel = this.isKey ? 0.0004 : (this.type === 'gnat' ? 0.01 : 0.001);
                this.vx += (tX - this.x) * accel + (Math.random()-0.5) * 0.5;
                this.vy += (tY - this.y) * accel + (Math.random()-0.5) * 0.5;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.94; this.vy *= 0.94;

                if (this.isKey && Math.hypot(this.x - px, this.y - py) < 60 && this.patience > 80) this.state = 'bloating';
            }
            draw() {
                if (this.state === 'hidden') return;
                ctx.save(); ctx.translate(this.x, this.y);
                let flap = Math.sin(Date.now() * 0.04) * (this.isKey ? 10 : 4);
                ctx.fillStyle = this.isKey ? `rgba(255,255,255,${this.patience/100})` : 'rgba(200,190,160,0.15)';
                ctx.beginPath(); ctx.ellipse(0, 0, 1.5+this.bloat/12, 3+this.bloat/10, 0, 0, Math.PI*2); ctx.fill();
                if (this.type !== 'gnat') {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8-this.bloat/4, -3+flap); ctx.lineTo(-3,-7); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8+this.bloat/4, -3+flap); ctx.lineTo(3,-7); ctx.fill();
                }
                ctx.restore();
            }
        }

        function drawVeil() {
            stalks.forEach(s => {
                let ax = s.relX - moveX;
                let tP = 0;
                if (mouse.x) {
                    let d = Math.hypot(mouse.x - ax, mouse.y - (s.baseY - s.h/2));
                    if (d < 200) tP = (mouse.x - ax > 0 ? -90 : 90) * (1 - d/200);
                }
                s.curP += (tP - s.curP) * 0.03;
                const endX = ax + s.curP + Math.sin(Date.now()*0.0006 + s.off)*10, endY = s.baseY - s.h;

                ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)'; ctx.lineWidth = s.w;
                ctx.beginPath(); ctx.moveTo(ax, s.baseY);
                ctx.quadraticCurveTo(ax + s.curP*0.5, s.baseY - s.h/2, endX, endY);
                ctx.stroke();

                // Leaf
                let lx = ax + (endX - ax) * 0.6, ly = s.baseY - s.h * 0.6;
                ctx.beginPath(); ctx.moveTo(lx, ly);
                ctx.quadraticCurveTo(lx + (s.leafSide * 40), ly - 15, lx + (s.leafSide * 25), ly + 45);
                ctx.stroke();
                
                // Fuzzy Tip
                ctx.fillStyle = 'rgba(210, 180, 140, 0.4)';
                ctx.beginPath(); ctx.ellipse(endX, endY, s.w*1.5, 20, Math.atan2(endY-s.baseY, endX-ax)+Math.PI/2, 0, Math.PI*2); ctx.fill();
            });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawVeil();
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup(); animate();
    </script>
</body>
</html>
