<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; transition: transform 0.4s ease-out; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.95) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 11; }
        #loginPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; padding: 40px; background: rgba(0,0,0,0.95); border: 1px solid #00ff41; color: #fff; font-family: monospace; z-index: 100; display: none; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="loginPanel">
        <h2 style="color: #00ff41; letter-spacing: 5px; margin-bottom: 20px;">MOTHLABS</h2>
        <p style="font-size: 10px; color: #888;">IDENTITY VERIFIED</p>
        <input type="password" placeholder="PORTAL OPEN" style="background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 80%; outline: none; margin-top: 10px;">
    </div>

    <script>
        const bg = document.getElementById('bg');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loginPanel = document.getElementById('loginPanel');
        
        let bugs = [];
        let stalks = [];
        const mouse = { x: null, y: null };
        let portalProgress = 0;

        // Lamp and Plant Locations based on the photo
        const lampX = () => window.innerWidth * 0.77;
        const lampY = () => window.innerHeight * 0.25; // High up where the globe is
        const plantX = () => window.innerWidth * 0.32;
        const plantY = () => window.innerHeight * 0.60;

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x; mouse.y = e.y;
            const moveX = (e.clientX / window.innerWidth - 0.5) * 40;
            bg.style.transform = `translateX(${-moveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Bug(true)]; 
            for (let i = 0; i < 20; i++) bugs.push(new Bug(false));
            
            // Generate only 7 specific tall stalks in front of the plant
            stalks = [];
            for (let i = 0; i < 7; i++) {
                stalks.push({
                    x: plantX() - 40 + (i * 15),
                    h: 300 + Math.random() * 100,
                    w: 3 + Math.random() * 3,
                    off: Math.random() * 1000
                });
            }
        }

        class Bug {
            constructor(isBig) {
                this.isBig = isBig;
                this.x = lampX(); this.y = lampY();
                this.size = isBig ? 4 : 1;
                this.vx = 0; this.vy = 0;
                this.patience = 100;
                this.returning = false;
            }
            update() {
                let targetX = lampX(), targetY = lampY();

                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isBig) {
                        if (d < 300 && !this.returning) {
                            targetX = mouse.x; targetY = mouse.y;
                            if (d > 140) this.patience -= 0.2;
                            else this.patience = Math.min(100, this.patience + 0.4);
                        } else { this.patience -= 0.8; }
                        if (this.patience <= 0) this.returning = true;
                        if (this.returning && d < 60) this.returning = false;
                    } else if (d < 100) { targetX = mouse.x; targetY = mouse.y; }
                }

                this.vx += (targetX - this.x) * (this.isBig ? 0.0008 : 0.005) + (Math.random()-0.5) * 1.5;
                this.vy += (targetY - this.y) * (this.isBig ? 0.0008 : 0.005) + (Math.random()-0.5) * 1.5;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.93; this.vy *= 0.93;

                // Settle logic at the plant
                if (this.isBig && Math.hypot(this.x - plantX(), this.y - plantY()) < 80) {
                    portalProgress++;
                    if (portalProgress > 110) loginPanel.style.display = 'block';
                } else if (this.isBig) { portalProgress = 0; }
            }
            draw() {
                ctx.fillStyle = this.isBig ? `rgba(255,255,255,${this.patience/100})` : 'rgba(255,255,180,0.15)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawVeil() {
            ctx.strokeStyle = 'rgba(5, 8, 5, 0.95)'; // Very dark green-black stalks
            stalks.forEach(s => {
                let lean = 0;
                if (mouse.x) {
                    let d = Math.abs(mouse.x - s.x);
                    if (d < 120) lean = (mouse.x - s.x) * 0.4;
                }
                ctx.lineWidth = s.w;
                ctx.beginPath();
                ctx.moveTo(s.x, window.innerHeight);
                ctx.quadraticCurveTo(s.x, window.innerHeight - s.h/2, s.x + lean + Math.sin(Date.now()*0.001 + s.off)*12, window.innerHeight - s.h);
                ctx.stroke();
            });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawVeil();
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup(); animate();
    </script>
</body>
</html>
