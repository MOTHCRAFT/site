<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        .sanctuary-bg { position: fixed; top: 0; left: -10%; width: 120%; height: 100%; background: url('bg.jpg') no-repeat center center; background-size: cover; z-index: 1; transition: transform 0.6s ease-out; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.98) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 11; }

        /* Cyber/Steampunk Terminal - Vertical Rounded Rectangle */
        #portalWrapper {
            position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0);
            width: 340px; height: 550px; background: rgba(2, 8, 2, 0.98);
            border: 2px solid #00ff41; z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,255,65,0.4);
            border-radius: 40px;
            transition: all 0.5s ease-out;
            overflow: hidden;
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* Liquid Spread Effect Overlay */
        #rippleOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 90; pointer-events: none; opacity: 0;
        }

        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 15px; width: 80%; text-align: center; border-radius: 10px; outline: none; margin-top: 20px; font-size: 14px;}
        h2 { color: #00ff41; letter-spacing: 8px; margin: 0; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <div id="rippleOverlay"></div>
    <canvas id="mainCanvas"></canvas>

    <div id="portalWrapper">
        <h2>MOTHLABS</h2>
        <p style="color: #00ff41; font-size: 11px; margin-top: 20px; letter-spacing: 2px;">CONSCIOUSNESS SYNCED</p>
        <div style="width: 80%; height: 1px; background: linear-gradient(to right, transparent, #00ff41, transparent); margin: 20px 0;"></div>
        <input type="password" placeholder="COMMUNION_KEY">
        <p style="color: #444; font-size: 9px; margin-top: 30px;">[RE-ESTABLISHING HENRY_PROTOCOL...]</p>
    </div>

    <script>
        const bg = document.getElementById('bg');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const portal = document.getElementById('portalWrapper');
        const ripple = document.getElementById('rippleOverlay');
        
        let bugs = [];
        let stalks = [];
        const mouse = { x: null, y: null };
        let globalMoveX = 0;
        let isTransitioning = false;

        const lampX = () => window.innerWidth * 0.77;
        const lampY = () => window.innerHeight * 0.24;
        const plantX = () => window.innerWidth * 0.32;
        const plantY = () => window.innerHeight * 0.60;

        window.addEventListener('mousemove', (e) => {
            if (isTransitioning) return;
            mouse.x = e.x; mouse.y = e.y;
            globalMoveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-globalMoveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Bug(true)]; 
            for (let i = 0; i < 22; i++) bugs.push(new Bug(false));
            
            stalks = [];
            for (let i = 0; i < 18; i++) {
                stalks.push({
                    relativeX: (plantX() - 200 + (Math.random() * 400)), // Wider spread
                    baseY: window.innerHeight * (0.80 + (Math.random() * 0.1)),
                    h: 500 + Math.random() * 350, 
                    w: 3 + Math.random() * 5, // Thicker variation
                    stiffness: 0.03 + Math.random() * 0.05,
                    off: Math.random() * 1000,
                    leafSide: Math.random() > 0.5 ? 1 : -1,
                    currentPush: 0
                });
            }
        }

        class Bug {
            constructor(isKey) {
                this.isKey = isKey;
                this.x = lampX(); this.y = lampY();
                this.size = isKey ? 5 : 1.2;
                this.vx = 0; this.vy = 0;
                this.patience = 100;
                this.returning = false;
                this.state = 'active'; // orbiting, following, bloating
                this.bloatScale = 1;
            }
            update() {
                if (this.state === 'bloating') {
                    this.bloatScale += 0.1;
                    this.size += 0.4;
                    if (this.size > 40) this.explode();
                    return;
                }

                let lx = lampX() - globalMoveX, ly = lampY();
                let px = plantX() - globalMoveX, py = plantY();
                let targetX = lx, targetY = ly;

                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isKey) {
                        if (d < 300 && !this.returning) {
                            targetX = mouse.x; targetY = mouse.y;
                            if (d > 140) this.patience -= 0.2;
                            else this.patience = Math.min(100, this.patience + 0.4);
                        } else { this.patience -= 0.8; }
                        if (this.patience <= 0) this.returning = true;
                        if (this.returning && Math.hypot(this.x - lx, this.y - ly) < 40) this.returning = false;
                    } else {
                        targetX = lx + (Math.random()-0.5)*50;
                        targetY = ly + (Math.random()-0.5)*50;
                    }
                }

                this.vx += (targetX - this.x) * (this.isKey ? 0.001 : 0.005) + (Math.random()-0.5) * 1.5;
                this.vy += (targetY - this.y) * (this.isKey ? 0.001 : 0.005) + (Math.random()-0.5) * 1.5;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.92; this.vy *= 0.92;

                // Check for Settle on Cannabis
                if (this.isKey && Math.hypot(this.x - px, this.y - py) < 60) {
                    this.state = 'bloating';
                    isTransitioning = true;
                }
            }
            explode() {
                ripple.style.transition = "none";
                ripple.style.opacity = "1";
                ripple.style.background = "radial-gradient(circle at "+this.x+"px "+this.y+"px, #00ff41 0%, white 100%)";
                setTimeout(() => {
                    ripple.style.transition = "opacity 1.5s ease-out";
                    ripple.style.opacity = "0";
                    portal.classList.add('active');
                }, 100);
                this.state = 'dead';
            }
            draw() {
                if (this.state === 'dead') return;
                ctx.fillStyle = this.isKey ? `rgba(255,255,255,${Math.max(0.2, this.patience/100)})` : 'rgba(255,255,180,0.15)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                if (this.isKey) { ctx.shadowBlur = 15; ctx.shadowColor = "white"; }
            }
        }

        function drawVeil() {
            stalks.forEach(s => {
                let anchoredX = s.relativeX - globalMoveX;
                let targetPush = 0;
                if (mouse.x) {
                    let dx = mouse.x - anchoredX;
                    let dy = mouse.y - (s.baseY - s.h/2);
                    let dist = Math.hypot(dx, dy);
                    if (dist < 250) {
                        targetPush = (dx > 0 ? -140 : 140) * (1 - dist/250);
                    }
                }
                s.currentPush += (targetPush - s.currentPush) * s.stiffness;

                const time = Date.now() * 0.001;
                const wind = Math.sin(time + s.off) * 8;
                const endX = anchoredX + s.currentPush + wind;
                const endY = s.baseY - s.h;

                ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)'; // Tan
                ctx.lineWidth = s.w;
                ctx.beginPath();
                ctx.moveTo(anchoredX, s.baseY);
                ctx.quadraticCurveTo(anchoredX + s.currentPush * 0.5, s.baseY - s.h/2, endX, endY);
                ctx.stroke();

                // One subtle drooping leaf per stalk
                ctx.beginPath();
                let lx = anchoredX + (endX - anchoredX) * 0.7;
                let ly = s.baseY - s.h * 0.7;
                ctx.moveTo(lx, ly);
                ctx.quadraticCurveTo(lx + (s.leafSide * 20), ly - 10, lx + (s.leafSide * 15), ly + 45);
                ctx.stroke();

                // Feathered Top (Fuzzy head)
                ctx.fillStyle = 'rgba(210, 180, 140, 0.4)';
                for(let i=0; i<3; i++) {
                   ctx.beginPath();
                   ctx.ellipse(endX + (i*2-2), endY, s.w + (3-i), 20 + (i*5), Math.atan2(endY - s.baseY, endX - anchoredX) + Math.PI/2, 0, Math.PI * 2);
                   ctx.fill();
                }
            });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawVeil();
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup(); animate();
    </script>
</body>
</html>
