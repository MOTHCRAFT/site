<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; 
            transition: transform 0.8s cubic-bezier(0.1, 0.4, 0.2, 1);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        #portalWrapper {
            position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0);
            width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98);
            border: 1px solid rgba(200, 180, 140, 0.2); z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 40px;
            transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(200, 180, 140, 0.1); color: rgba(200, 180, 140, 0.5); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>

    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        window.onload = function() {
            const DEBUG_MODE = true; 
            const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
            let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, transitioning = false;

            const LAMP_IMG_X = 0.745, LAMP_IMG_Y = 0.21; 
            const PLANT_IMG_X = 0.32, PLANT_IMG_Y = 0.73;

            window.addEventListener('mousemove', (e) => {
                if (transitioning) return;
                mouse.x = e.x; mouse.y = e.y;
                moveX = (e.clientX / window.innerWidth - 0.5) * 45;
                bg.style.transform = `translateX(${-moveX}px)`;
            });

            function getScreenCoords(imgX_pct, imgY_pct) {
                const vW = window.innerWidth, vH = window.innerHeight;
                const bgW = vW * 1.2;
                return { x: (vW/2)-(moveX)+(bgW*(imgX_pct-0.5)), y: vH*imgY_pct };
            }

            class Reed {
                constructor(targetX) {
                    this.relX = targetX + (Math.random() - 0.5) * 0.05;
                    this.relY = PLANT_IMG_Y + (Math.random() * 0.08);
                    this.hMult = 0.35 + (Math.random() * 0.2); 
                    this.off = Math.random() * 1000;
                    this.curPush = 0;
                    this.baseLean = (Math.random() - 0.5) * 0.3;
                    this.leafSide = Math.random() > 0.5 ? 1 : -1;
                }
                draw() {
                    const pos = getScreenCoords(this.relX, this.relY);
                    const h = window.innerHeight * this.hMult;
                    let tP = 0;
                    if (mouse.x) {
                        let dx = mouse.x - pos.x, d = Math.hypot(dx, mouse.y - (pos.y - h/2));
                        if (d < 180) tP = (dx > 0 ? -120 : 120) * (1 - d/180);
                    }
                    this.curPush += (tP - this.curPush) * 0.05;

                    let mainColor = DEBUG_MODE ? 'rgba(210, 180, 140, 0.7)' : 'rgba(12, 18, 8, 0.98)';
                    let grad = ctx.createLinearGradient(0, pos.y, 0, pos.y - h);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(0.3, mainColor);
                    grad.addColorStop(1, DEBUG_MODE ? mainColor : 'rgba(150, 140, 100, 0.6)'); 
                    
                    ctx.strokeStyle = grad; ctx.lineWidth = 2 + (Math.random() * 2);
                    let px = pos.x, py = pos.y;
                    
                    for (let j = 1; j <= 3; j++) {
                        let t = j / 3;
                        const wind = Math.sin(Date.now() * 0.0005 + this.off + j) * (10 * t);
                        let targetX = pos.x + (Math.pow(t, 1.4) * (this.curPush + (this.baseLean * 80))) + wind;
                        let targetY = pos.y - (h * t);
                        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                        if (j === 2) {
                            ctx.save(); ctx.translate(targetX, targetY);
                            ctx.beginPath(); ctx.moveTo(0,0);
                            ctx.quadraticCurveTo(this.leafSide * 40, -5, this.leafSide * 25, 50);
                            ctx.strokeStyle = mainColor; ctx.lineWidth = 1; ctx.stroke();
                            ctx.restore();
                        }
                        px = targetX; py = targetY;
                    }
                    ctx.fillStyle = mainColor;
                    ctx.beginPath(); ctx.ellipse(px, py, 4, 18, Math.atan2(py - pos.y, px - pos.x) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
                }
            }

            class Moth {
                constructor(isKey, type = 'moth') {
                    this.isKey = isKey; this.type = type;
                    const p = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                    this.x = p.x; this.y = p.y;
                    this.vx = 0; this.vy = 0; this.bloat = 0; this.state = 'active'; this.patience = 100;
                    this.size = isKey ? 5 : (type === 'gnat' ? 0.7 : 1.5);
                }
                update() {
                    const lp = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                    const pp = getScreenCoords(PLANT_IMG_X, 0.40);
                    if (this.state === 'bloating') {
                        this.x += (mouse.x - this.x) * 0.15; this.y += (mouse.y - this.y) * 0.15;
                        this.bloat += 0.25; if (this.bloat > 40) { portal.classList.add('active'); this.state = 'hidden'; transitioning = true; }
                        return;
                    }
                    if (this.state === 'hidden') return;
                    let tX = lp.x, tY = lp.y;
                    if (mouse.x) {
                        let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                        if (this.isKey) {
                            if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.25); }
                            else { this.patience -= 0.5; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                        } else { tX = lp.x + (Math.random()-0.5)*100; tY = lp.y + (Math.random()-0.5)*100; }
                    }
                    let accel = this.isKey ? 0.0003 : (this.type === 'gnat' ? 0.01 : 0.0012);
                    this.vx += (tX - this.x) * accel + (Math.random()-0.5) * (this.type === 'gnat' ? 0.8 : 0.4);
                    this.vy += (tY - this.y) * accel + (Math.random()-0.5) * (this.type === 'gnat' ? 0.8 : 0.4);
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= 0.95; this.vy *= 0.95;
                    if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 60 && this.patience > 80) this.state = 'bloating';
                }
                draw() {
                    if (this.state === 'hidden') return;
                    ctx.save(); ctx.translate(this.x, this.y);
                    let flap = Math.sin(Date.now() * 0.04) * (this.isKey ? 10 : 4);
                    ctx.shadowBlur = this.isKey ? 8 : 2; ctx.shadowColor = "rgba(255, 255, 200, 0.5)";
                    ctx.fillStyle = this.isKey ? `rgba(255,255,255,${this.patience/100})` : 'rgba(255, 255, 220, 0.3)';
                    ctx.beginPath(); ctx.ellipse(0, 0, 1.2+this.bloat/12, 2.5+this.bloat/10, 0, 0, Math.PI*2); ctx.fill();
                    if (this.type !== 'gnat') {
                        ctx.globalAlpha = 0.4; // Soften wings
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-7-this.bloat/4, -3+flap); ctx.lineTo(-3,-6); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(7+this.bloat/4, -3+flap); ctx.lineTo(3,-6); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function setup() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                bugs = [new Moth(true)]; 
                for (let i = 0; i < 6; i++) bugs.push(new Moth(false, 'moth'));
                for (let i = 0; i < 12; i++) bugs.push(new Moth(false, 'gnat'));
                stalks = [];
                // Spawning in zones: Center, Left, Right
                for (let i = 0; i < 10; i++) stalks.push(new Reed(PLANT_IMG_X));
                for (let i = 0; i < 4; i++) stalks.push(new Reed(PLANT_IMG_X - 0.15));
                for (let i = 0; i < 4; i++) stalks.push(new Reed(PLANT_IMG_X + 0.15));
            }

            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stalks.forEach(s => s.draw());
                bugs.forEach(b => { b.update(); b.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', setup);
            setup(); animate();
        };
    </script>
</body>
</html>
