<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; 
            transition: transform 0.6s cubic-bezier(0.1, 0.4, 0.2, 1);
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        #portalWrapper {
            position: fixed; top: 50%; left: 30%; transform: translate(-50%, -50%) scale(0);
            width: 320px; height: 500px; background: rgba(5, 7, 5, 0.98);
            border: 1px solid rgba(200, 180, 140, 0.2); z-index: 100; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 40px;
            transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }
        #portalWrapper.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .field { background: rgba(255,255,255,0.02); border: 1px solid rgba(200, 180, 140, 0.1); color: rgba(200, 180, 140, 0.5); padding: 18px; width: 70%; border-radius: 15px; outline: none; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>

    <div id="portalWrapper">
        <input type="text" class="field" spellcheck="false" autocomplete="off">
        <input type="password" class="field">
    </div>

    <script>
        const bg = document.getElementById('bg'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), portal = document.getElementById('portalWrapper');
        let bugs = [], stalks = [], mouse = { x: null, y: null }, moveX = 0, isTransitioning = false;

        // Image Constants (Percentage into the 21:9 image)
        const LAMP_IMG_X = 0.77, LAMP_IMG_Y = 0.38;
        const PLANT_IMG_X = 0.32, PLANT_IMG_Y = 0.70;

        window.addEventListener('mousemove', (e) => {
            if (isTransitioning) return;
            mouse.x = e.x; mouse.y = e.y;
            moveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-moveX}px)`;
        });

        // This function finds where a point in the IMAGE is on the SCREEN
        function getScreenCoords(imgX_pct, imgY_pct) {
            const vW = window.innerWidth, vH = window.innerHeight;
            const bgW = vW * 1.2; // Based on CSS width: 120%
            const activeX = (vW / 2) - (moveX) + (bgW * (imgX_pct - 0.5));
            const activeY = vH * imgY_pct;
            return { x: activeX, y: activeY };
        }

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Moth(true)]; 
            for (let i = 0; i < 12; i++) bugs.push(new Moth(false, 'moth'));
            for (let i = 0; i < 18; i++) bugs.push(new Moth(false, 'gnat'));
            
            stalks = [];
            for (let i = 0; i < 15; i++) {
                stalks.push(new Stalk(i));
            }
        }

        class Stalk {
            constructor(i) {
                this.relX = PLANT_IMG_X + ((Math.random() - 0.5) * 0.1);
                this.relY = PLANT_IMG_Y + (Math.random() * 0.05);
                this.hMult = 0.35 + (Math.random() * 0.15); // Percentage of screen height
                this.segments = 5;
                this.off = Math.random() * 1000;
                this.curPush = 0;
                this.leafSide = Math.random() > 0.5 ? 1 : -1;
            }
            draw() {
                const pos = getScreenCoords(this.relX, this.relY);
                const h = window.innerHeight * this.hMult;
                
                let tP = 0;
                if (mouse.x) {
                    let dx = mouse.x - pos.x, d = Math.hypot(dx, mouse.y - (pos.y - h/2));
                    if (d < 200) tP = (dx > 0 ? -100 : 100) * (1 - d/200);
                }
                this.curPush += (tP - this.curPush) * 0.04;

                let grad = ctx.createLinearGradient(0, pos.y, 0, pos.y - h);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(0.3, 'rgba(210, 180, 140, 0.4)');
                grad.addColorStop(1, 'rgba(210, 180, 140, 0.7)');
                
                ctx.strokeStyle = grad; ctx.lineWidth = 3;
                
                let px = pos.x, py = pos.y;
                for (let j = 1; j <= this.segments; j++) {
                    let t = j / this.segments;
                    const wind = Math.sin(Date.now() * 0.0007 + this.off + j) * (8 * t);
                    let targetX = pos.x + (Math.pow(t, 1.4) * this.curPush) + wind;
                    let targetY = pos.y - (h * t);
                    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetX, targetY); ctx.stroke();
                    px = targetX; py = targetY;
                }

                // Drooping Leaf
                ctx.beginPath();
                let lx = pos.x + (px - pos.x) * 0.6, ly = pos.y - h * 0.6;
                ctx.moveTo(lx, ly);
                ctx.quadraticCurveTo(lx + (this.leafSide * 40), ly - 10, lx + (this.leafSide * 30), ly + 40);
                ctx.stroke();

                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.ellipse(px, py, 5, 20, Math.atan2(py - pos.y, px - pos.x) + Math.PI/2, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Moth {
            constructor(isKey, type = 'moth') {
                this.isKey = isKey; this.type = type;
                const p = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                this.x = p.x; this.y = p.y;
                this.vx = 0; this.vy = 0; this.bloat = 0; this.state = 'active'; this.patience = 100;
                this.size = isKey ? 5 : (type === 'gnat' ? 0.8 : 2);
            }
            update() {
                const lp = getScreenCoords(LAMP_IMG_X, LAMP_IMG_Y);
                const pp = getScreenCoords(PLANT_IMG_X, 0.45); // Landing target

                if (this.state === 'bloating') {
                    this.x += (mouse.x - this.x) * 0.15; this.y += (mouse.y - this.y) * 0.15;
                    this.bloat += 0.3; if (this.bloat > 40) { portal.classList.add('active'); this.state = 'hidden'; isTransitioning = true; }
                    return;
                }
                if (this.state === 'hidden') return;

                let tX = lp.x, tY = lp.y;
                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isKey) {
                        if (d < 300) { tX = mouse.x; tY = mouse.y; this.patience = Math.min(100, this.patience + 0.25); }
                        else { this.patience -= 0.4; if (this.patience <= 0) { this.x = lp.x; this.y = lp.y; this.patience = 100; } }
                    } else { tX = lp.x + (Math.random()-0.5)*150; tY = lp.y + (Math.random()-0.5)*150; }
                }

                let accel = this.isKey ? 0.0005 : (this.type === 'gnat' ? 0.008 : 0.001);
                this.vx += (tX - this.x) * accel + (Math.random()-0.5) * 0.5;
                this.vy += (tY - this.y) * accel + (Math.random()-0.5) * 0.5;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.94; this.vy *= 0.94;

                if (this.isKey && Math.hypot(this.x - pp.x, this.y - pp.y) < 60 && this.patience > 80) this.state = 'bloating';
            }
            draw() {
                if (this.state === 'hidden') return;
                ctx.save(); ctx.translate(this.x, this.y);
                let flap = Math.sin(Date.now() * 0.04) * (this.isKey ? 12 : 5);
                ctx.fillStyle = this.isKey ? `rgba(255,255,255,${this.patience/100})` : 'rgba(255, 255, 200, 0.15)';
                ctx.beginPath(); ctx.ellipse(0, 0, 1.5+this.bloat/12, 3+this.bloat/10, 0, 0, Math.PI*2); ctx.fill();
                if (this.type !== 'gnat') {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8-this.bloat/4, -3+flap); ctx.lineTo(-3,-7); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8+this.bloat/4, -3+flap); ctx.lineTo(3,-7); ctx.fill();
                }
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            stalks.forEach(s => s.draw());
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        setup(); animate();
    </script>
</body>
</html>
