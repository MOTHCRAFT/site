<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTHLABS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .sanctuary-bg { 
            position: fixed; top: 0; left: -10%; width: 120%; height: 100%; 
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 1; transition: transform 0.5s ease-out; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.96) 100%); pointer-events: none; z-index: 10; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 11; }
        #loginPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; padding: 40px; background: rgba(0,0,0,0.95); border: 1px solid #00ff41; color: #fff; font-family: monospace; z-index: 100; display: none; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
    </style>
</head>
<body>
    <div class="sanctuary-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="loginPanel">
        <h2 style="color: #00ff41; letter-spacing: 5px; margin-bottom: 20px;">MOTHLABS</h2>
        <p style="font-size: 10px; color: #888;">IDENTITY CONFIRMED</p>
        <input type="password" placeholder="COMMUNION ACCESS" style="background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 80%; outline: none; margin-top: 10px;">
    </div>

    <script>
        const bg = document.getElementById('bg');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loginPanel = document.getElementById('loginPanel');
        
        let bugs = [];
        let stalks = [];
        const mouse = { x: null, y: null };
        let portalProgress = 0;
        let globalMoveX = 0;

        const lampX = () => window.innerWidth * 0.77;
        const lampY = () => window.innerHeight * 0.24;
        const plantX = () => window.innerWidth * 0.32;
        const plantY = () => window.innerHeight * 0.60;

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x; mouse.y = e.y;
            globalMoveX = (e.clientX / window.innerWidth - 0.5) * 45;
            bg.style.transform = `translateX(${-globalMoveX}px)`;
        });

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bugs = [new Bug(true)]; 
            for (let i = 0; i < 18; i++) bugs.push(new Bug(false));
            
            stalks = [];
            for (let i = 0; i < 16; i++) {
                let sH = 500 + Math.random() * 350;
                let sLeaves = [];
                // Generate 3-5 "shucks" or leaves per stalk
                for(let j=0; j < 4; j++) {
                    sLeaves.push({
                        yOff: 0.3 + (Math.random() * 0.5), // height on stalk
                        side: Math.random() > 0.5 ? 1 : -1,
                        len: 30 + Math.random() * 50,
                        droop: 20 + Math.random() * 40
                    });
                }
                stalks.push({
                    relativeX: (plantX() - 180 + (Math.random() * 360)), 
                    baseY: window.innerHeight * (0.80 + (Math.random() * 0.08)),
                    h: sH, 
                    w: 2 + Math.random() * 3,
                    stiffness: 0.04 + Math.random() * 0.08,
                    drift: (Math.random() - 0.5) * 0.3,
                    off: Math.random() * 1000,
                    leaves: sLeaves,
                    currentPush: 0
                });
            }
        }

        class Bug {
            constructor(isBig) {
                this.isBig = isBig;
                this.x = lampX(); this.y = lampY();
                this.size = isBig ? 5 : 1;
                this.vx = (Math.random()-0.5) * 5; this.vy = (Math.random()-0.5) * 5;
                this.patience = 100;
                this.returning = false;
            }
            update() {
                let lx = lampX() - globalMoveX, ly = lampY();
                let px = plantX() - globalMoveX, py = plantY();
                let targetX = lx, targetY = ly;

                if (mouse.x) {
                    let d = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                    if (this.isBig) {
                        if (d < 300 && !this.returning) {
                            targetX = mouse.x; targetY = mouse.y;
                            if (d > 140) this.patience -= 0.18;
                            else this.patience = Math.min(100, this.patience + 0.3);
                        } else { this.patience -= 0.7; }
                        if (this.patience <= 0) this.returning = true;
                        if (this.returning && Math.hypot(this.x - lx, this.y - ly) < 40) this.returning = false;
                    } else if (d < 90) { targetX = mouse.x; targetY = mouse.y; }
                }

                this.vx += (targetX - this.x) * (this.isBig ? 0.0007 : 0.004) + (Math.random()-0.5) * 1.6;
                this.vy += (targetY - this.y) * (this.isBig ? 0.0007 : 0.004) + (Math.random()-0.5) * 1.6;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.92; this.vy *= 0.92;

                if (this.isBig && Math.hypot(this.x - px, this.y - py) < 80) {
                    portalProgress++;
                    if (portalProgress > 100) loginPanel.style.display = 'block';
                } else if (this.isBig) { portalProgress = 0; }
            }
            draw() {
                ctx.fillStyle = this.isBig ? `rgba(255,255,255,${Math.max(0.1, this.patience/100)})` : 'rgba(255,255,180,0.1)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function drawVeil() {
            stalks.forEach(s => {
                let anchoredX = s.relativeX - globalMoveX;
                let targetPush = 0;
                if (mouse.x) {
                    let dx = mouse.x - anchoredX;
                    let dy = mouse.y - (s.baseY - s.h/2);
                    let dist = Math.hypot(dx, dy);
                    if (dist < 200) {
                        targetPush = (dx > 0 ? -90 : 90) * (1 - dist/200);
                    }
                }
                s.currentPush += (targetPush - s.currentPush) * s.stiffness;

                const time = Date.now() * 0.001;
                const wind = Math.sin(time + s.off) * 15;
                
                const startX = anchoredX;
                const startY = s.baseY;
                const endX = anchoredX + s.currentPush + wind + (s.drift * 150);
                const endY = s.baseY - s.h;

                // 1. Draw Stalk
                ctx.strokeStyle = 'rgba(210, 180, 140, 0.7)'; // Tan for debug
                ctx.lineWidth = s.w;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                const cpX = startX + s.currentPush * 0.5;
                const cpY = startY - s.h/2;
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.stroke();

                // 2. Draw Shucks (Leaves)
                s.leaves.forEach(l => {
                    let lx = startX + (endX - startX) * l.yOff;
                    let ly = startY + (endY - startY) * l.yOff;
                    ctx.beginPath();
                    ctx.moveTo(lx, ly);
                    ctx.quadraticCurveTo(lx + (l.side * l.len), ly + l.droop, lx + (l.side * l.len * 0.8), ly + l.droop + 10);
                    ctx.stroke();
                });

                // 3. Draw Fuzzy Head
                ctx.fillStyle = 'rgba(210, 180, 140, 0.4)';
                ctx.beginPath();
                ctx.ellipse(endX, endY, s.w * 2, 22 + (s.w * 3), Math.atan2(endY - startY, endX - startX) + Math.PI/2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawVeil();
            bugs.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup(); animate();
    </script>
</body>
</html>
